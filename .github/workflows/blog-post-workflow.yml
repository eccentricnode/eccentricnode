name: Latest blog post workflow
on:
  schedule:
    # Sunday at 12:00 UTC — keeps the README's blog list fresh weekly.
    - cron: '0 12 * * 0'
  workflow_dispatch:

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull in latest blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://www.theaustinjohnson.com/index.xml"
          # Cloudflare in front of theaustinjohnson.com 403s the action's default UA.
          user_agent: "Mozilla/5.0 (compatible; blog-post-workflow; +https://github.com/gautamkrishnar/blog-post-workflow)"
